<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      color: #111;
      background: #fff;
    }

    header {
      background: #111;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    header img {
      height: 50px;
      width: auto;
    }

    header .header-text {
      border-left: 3px solid #fbe315;
      padding-left: 1.2rem;
    }

    header .header-text h1 {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    header .header-text p {
      color: #aaa;
      font-size: 0.8rem;
      margin-top: 0.2rem;
    }

    main {
      max-width: 860px;
      margin: 3rem auto;
      padding: 0 2rem;
      line-height: 1.7;
    }

    main h1, main h2, main h3 {
      margin: 2rem 0 0.8rem;
      padding-bottom: 0.3rem;
      border-bottom: 2px solid #fbe315;
    }

    main p { margin-bottom: 1rem; }

    main a { color: #111; text-decoration-color: #fbe315; }
    main a:hover { color: #fbe315; }

    main table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
    }

    main th {
      background: #111;
      color: #fff;
      padding: 0.6rem 1rem;
      text-align: left;
    }

    main td {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #eee;
    }

    main tr:hover td { background: #fffbe6; }

    main code {
      background: #f5f5f5;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-size: 0.9em;
    }

    main pre {
      background: #111;
      color: #fbe315;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      margin: 1rem 0;
    }
  </style>
</head>
<body>

  <header>
    <img src="{{ '/assets/img/logo-cesi.png' | relative_url }}" alt="CESI">
    <div class="header-text">
      <h1>{{ site.title }}</h1>
      <p>{{ site.description }}</p>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

</body>
</html>
